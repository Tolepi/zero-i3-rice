[bar/main]
width = 100%
height = 27pt
radius = 0

background = #dbd5d1
foreground = #2d2926

border-bottom-size = 2pt
border-bottom-color = #9a938d

padding-left = 2
padding-right = 2
module-margin = 2

font-0 = "CaskaydiaCove Nerd Font:size=11;2"

modules-left = gentoo
modules-center = customtext
modules-right = cpu memory pulseaudio tray date

override-redirect = false
wm-restack = i3

[module/customtext]
type = custom/text
content = "Ich will dich nicht verlieren."
content-foreground = #2d2926
content-padding = 2

label-focused = %name%
label-focused-background = #2d2926
label-focused-foreground = #dbd5d1
label-focused-padding = 2

label-unfocused = %name%
label-unfocused-padding = 2
label-unfocused-foreground = #9a938d

[module/tray]
type = internal/tray
tray-spacing = 8px
tray-background = #dbd5d1

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "󰍛 "
format-prefix-foreground = #9a938d
label = %percentage%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "󰘚 "
format-prefix-foreground = #9a938d
label = %percentage_used%%

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
format-volume-prefix = "󰕾 "
format-volume-prefix-foreground = #9a938d
label-volume = %percentage%%

format-muted = <label-muted>
label-muted = "󰝟 Muted"
label-muted-foreground = #9a938d

[module/date]
type = internal/date
interval = 1
date = %H:%M
label = %date%
label-foreground = #2d2926

[module/gentoo]
type = custom/text
content = " "
content-foreground = #2d2926
content-background = #dbd5d1
content-padding = 0
click-left = rofi -show drun
click-right = rofi -show drun
click-middle = rofi -show drun
